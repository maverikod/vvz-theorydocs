# CI: lint and test on push/PR.
# Author: Vasiliy Zdanovskiy
# email: vasilyvz@gmail.com

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black
        run: black --check theorydocs

      - name: Flake8
        run: flake8 theorydocs

      - name: Mypy
        run: mypy theorydocs

      - name: Pytest
        run: pytest tests -v
